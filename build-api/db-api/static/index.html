<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GORM User UI</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #eef2f7; color: #222; }
    .container { max-width: 980px; margin: 0 auto; padding: 30px 20px; }
    header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 20px; }
    header h1 { margin: 0; font-size: 2rem; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 14px 35px rgba(20, 30, 60, 0.08); padding: 24px; margin-bottom: 1.5rem; }
    .row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
    input[type="text"], input[type="email"], input[type="search"] { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #ced4da; font-size: 1rem; }
    button { border: none; border-radius: 10px; padding: 12px 18px; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; min-height: 44px; transition: transform 0.15s ease, background 0.15s ease; }
    button:hover { transform: translateY(-1px); }
    .primary { background: #2f74eb; color: #fff; }
    .secondary { background: #6c757d; color: white; }
    .danger { background: #dc3545; color: white; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; justify-content: flex-start; margin-bottom: 1rem; }
    .toolbar input { flex: 1; min-width: 220px; }
    .message { min-height: 1.5rem; margin: 0.75rem 0; font-weight: 600; }
    .message.success { color: #155724; }
    .message.error { color: #721c24; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; }
    th, td { text-align: left; padding: 14px 16px; border-bottom: 1px solid #eef2f8; }
    th { background: #f4f7fb; font-weight: 700; }
    tr:hover { background: #f8fbff; }
    .actions button { margin-right: 0.5rem; margin-bottom: 0.4rem; }
    .hidden { display: none; }
    @media (max-width: 768px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>GORM User Dashboard</h1>
        <p>Use the form below to add or edit users, and manage the list interactively.</p>
      </div>
    </header>

    <div class="card">
      <h2>User Form</h2>
      <div class="row">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="e.g. Alice Johnson" />
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="e.g. alice@example.com" />
        </div>
      </div>
      <div class="toolbar">
        <button id="saveBtn" class="primary">Save User</button>
        <button id="cancelEditBtn" class="secondary hidden">Cancel Edit</button>
        <div style="margin-left:auto; display:flex; gap:0.75rem; flex-wrap:wrap;">
          <button id="refreshBtn" class="secondary">Refresh List</button>
        </div>
      </div>
      <div class="message" id="message"></div>
    </div>

    <div class="card">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Search by name or email" />
        <button id="clearFilterBtn" class="secondary">Clear Filter</button>
      </div>
      <div class="table-wrap">
        <table id="usersTable">
          <thead>
            <tr><th>ID</th><th>Name</th><th>Email</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const apiBase = '';
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const saveBtn = document.getElementById('saveBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const searchInput = document.getElementById('searchInput');
    const clearFilterBtn = document.getElementById('clearFilterBtn');
    const usersTableBody = document.querySelector('#usersTable tbody');
    const messageEl = document.getElementById('message');

    let users = [];
    let editUserId = null;

    function normalizeUser(user) {
      return {
        ID: user.ID || user.id || '',
        Name: user.Name || user.name || '',
        Email: user.Email || user.email || ''
      };
    }

    function setFormState(isEditing) {
      editUserId = isEditing ? editUserId : null;
      saveBtn.textContent = isEditing ? 'Save Changes' : 'Save User';
      cancelEditBtn.classList.toggle('hidden', !isEditing);
    }

    function showMessage(text, type = 'success') {
      messageEl.textContent = text;
      messageEl.className = 'message ' + (type === 'error' ? 'error' : 'success');
      if (text) setTimeout(() => { messageEl.textContent = ''; }, 4000);
    }

    function renderUsers(list) {
      usersTableBody.innerHTML = '';
      if (!list.length) {
        usersTableBody.innerHTML = '<tr><td colspan="4">No users found.</td></tr>';
        return;
      }
      list.forEach(user => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${user.ID}</td>
          <td>${user.Name}</td>
          <td>${user.Email}</td>
          <td class="actions">
            <button class="secondary" onclick="startEdit(${user.ID})">Edit</button>
            <button class="danger" onclick="deleteUser(${user.ID})">Delete</button>
          </td>`;
        usersTableBody.appendChild(row);
      });
    }

    function filterUsers() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = users.filter(user => {
        return user.Name.toLowerCase().includes(query) || user.Email.toLowerCase().includes(query);
      });
      renderUsers(filtered);
    }

    async function fetchUsers() {
      try {
        const res = await fetch(apiBase + '/userlist');
        if (!res.ok) throw new Error('Unable to load users');
        const data = await res.json();
        users = (data.users || data || []).map(normalizeUser);
        filterUsers();
      } catch (err) {
        showMessage(err.message, 'error');
      }
    }

    async function saveUser() {
      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      if (!name || !email) return showMessage('Name and email are required.', 'error');

      const payload = { name, email };
      const url = editUserId ? apiBase + '/updateUser/' + editUserId : apiBase + '/createUser';
      const method = editUserId ? 'PUT' : 'POST';

      saveBtn.disabled = true;
      saveBtn.textContent = editUserId ? 'Saving...' : 'Saving...';
      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error(editUserId ? 'Unable to update user' : 'Unable to create user');
        showMessage(editUserId ? 'User updated successfully.' : 'User created successfully.');
        resetForm();
        await fetchUsers();
      } catch (err) {
        showMessage(err.message, 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = editUserId ? 'Save Changes' : 'Save User';
      }
    }

    async function deleteUser(id) {
      if (!confirm('Delete this user?')) return;
      try {
        const res = await fetch(apiBase + '/deleteUser/' + id, { method: 'DELETE' });
        if (!res.ok) throw new Error('Unable to delete user');
        showMessage('User deleted successfully.');
        await fetchUsers();
      } catch (err) {
        showMessage(err.message, 'error');
      }
    }

    function startEdit(id) {
      const user = users.find(item => String(item.ID) === String(id));
      if (!user) return showMessage('User not found.', 'error');
      editUserId = user.ID;
      nameInput.value = user.Name;
      emailInput.value = user.Email;
      setFormState(true);
      showMessage('Editing user ID ' + id + '.');
    }

    function resetForm() {
      editUserId = null;
      nameInput.value = '';
      emailInput.value = '';
      setFormState(false);
    }

    function clearFilter() {
      searchInput.value = '';
      filterUsers();
    }

    saveBtn.addEventListener('click', saveUser);
    cancelEditBtn.addEventListener('click', event => {
      event.preventDefault();
      resetForm();
      showMessage('Edit cancelled.', 'success');
    });
    refreshBtn.addEventListener('click', fetchUsers);
    searchInput.addEventListener('input', filterUsers);
    clearFilterBtn.addEventListener('click', clearFilter);

    fetchUsers();
    window.startEdit = startEdit;
    window.deleteUser = deleteUser;
  </script>
</body>
</html>
